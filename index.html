<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Development Companion</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/glassmorphism.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div id="app">
    <!-- Ambient Particles Background -->
    <div class="ambient-particles" id="ambient-particles"></div>

    <!-- Notification Container -->
    <div class="notification-container" id="notification-container"></div>

    <!-- Floating Dock Navigation -->
    <nav class="floating-dock glass-dock">
      <button class="dock-item active" data-panel="companion" title="AI Companion">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><circle cx="9" cy="9" r="1" fill="currentColor"/><circle cx="15" cy="9" r="1" fill="currentColor"/>
        </svg>
        <span class="dock-tooltip">Companion (Ctrl+1)</span>
      </button>
      <button class="dock-item" data-panel="dashboard" title="Dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span class="dock-tooltip">Dashboard (Ctrl+2)</span>
      </button>
      <button class="dock-item" data-panel="terminal" title="Terminal">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
        </svg>
        <span class="dock-tooltip">Terminal (Ctrl+3)</span>
      </button>
      <button class="dock-item" data-panel="conversation" title="Conversation">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        <span class="dock-tooltip">Conversation (Ctrl+4)</span>
      </button>
      <button class="dock-item" data-panel="features" title="Features">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        <span class="dock-tooltip">Features (Ctrl+5)</span>
      </button>
      <div class="dock-separator"></div>
      <button class="dock-item" data-panel="knowledge" title="Knowledge Base">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
        </svg>
        <span class="dock-tooltip">Knowledge Base (Ctrl+6)</span>
      </button>
      <button class="dock-item" data-panel="crossverify" title="Cross Verify">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/>
        </svg>
        <span class="dock-tooltip">Cross Verify (Ctrl+7)</span>
      </button>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Companion Panel -->
      <section class="panel active" id="panel-companion">
        <div id="companion-container">
          <div class="companion-orb-section"></div>
          <div class="companion-status"></div>
          <div class="companion-messages"></div>
          <div class="companion-voice-mode"></div>
        </div>
      </section>

      <!-- Dashboard Panel -->
      <section class="panel" id="panel-dashboard"></section>

      <!-- Terminal Panel -->
      <section class="panel" id="panel-terminal"></section>

      <!-- Conversation Panel -->
      <section class="panel" id="panel-conversation"></section>

      <!-- Features Panel -->
      <section class="panel" id="panel-features"></section>

      <!-- Knowledge Base Panel -->
      <section class="panel" id="panel-knowledge"></section>

      <!-- Cross Verify Panel -->
      <section class="panel" id="panel-crossverify"></section>
    </main>
  </div>

  <style>
    /* ============================================
       Inline Component Styles
       ============================================ */

    /* Companion Orb Styles */
    .companion-orb-section {
      display: flex;
      justify-content: center;
      padding: var(--space-2xl) 0;
    }

    .orb-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-lg);
    }

    .orb-container {
      position: relative;
      width: 160px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .orb-core {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, var(--accent-primary), var(--accent-secondary), var(--accent-cyan));
      animation: breathing 4s ease-in-out infinite, morphShape 8s ease-in-out infinite;
      box-shadow:
        0 0 40px rgba(99, 102, 241, 0.4),
        0 0 80px rgba(139, 92, 246, 0.2),
        0 0 120px rgba(34, 211, 238, 0.1);
    }

    .orb-inner-ring {
      position: absolute;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 1px solid rgba(99, 102, 241, 0.3);
      animation: orbInnerPulse 4s ease-in-out infinite;
    }

    .orb-outer-ring {
      position: absolute;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 1px solid rgba(99, 102, 241, 0.15);
      animation: orbInnerPulse 4s ease-in-out infinite 1s;
    }

    .orb-particles {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .orb-particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--accent-primary);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      opacity: 0;
      animation: analyzeParticle 3s ease-out infinite;
      animation-delay: var(--delay);
      --tx: calc(cos(var(--angle)) * var(--distance));
      --ty: calc(sin(var(--angle)) * var(--distance));
    }

    .orb-waveform {
      position: absolute;
      display: none;
      align-items: center;
      gap: 3px;
      height: 40px;
    }

    .orb-analyzing .orb-core {
      background: radial-gradient(circle at 30% 30%, var(--accent-amber), var(--accent-primary));
      animation: breathing 2s ease-in-out infinite, morphShape 4s ease-in-out infinite;
      box-shadow:
        0 0 40px rgba(251, 191, 36, 0.4),
        0 0 80px rgba(251, 191, 36, 0.2);
    }

    .orb-analyzing .orb-inner-ring {
      animation: thinking 3s linear infinite;
      border-color: rgba(251, 191, 36, 0.4);
    }

    .orb-speaking .orb-waveform {
      display: flex;
    }

    .orb-speaking .orb-core {
      background: radial-gradient(circle at 30% 30%, var(--accent-cyan), var(--accent-primary));
      box-shadow:
        0 0 50px rgba(34, 211, 238, 0.5),
        0 0 100px rgba(99, 102, 241, 0.25);
    }

    .wave-bar {
      width: 3px;
      height: 4px;
      background: var(--accent-cyan);
      border-radius: var(--radius-full);
      animation: waveform 0.8s ease-in-out infinite;
      animation-delay: var(--delay);
    }

    .orb-label {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: var(--font-size-xs);
      color: var(--text-secondary);
    }

    .mini-orb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-primary), var(--accent-secondary));
      box-shadow: 0 0 8px rgba(99, 102, 241, 0.4);
      animation: breathing 4s ease-in-out infinite;
    }

    .mini-orb-user {
      background: radial-gradient(circle, var(--accent-cyan), var(--accent-emerald));
    }

    /* Companion Status */
    .companion-status {
      margin: 0 auto;
      max-width: 600px;
    }

    .status-card {
      padding: var(--space-lg);
      border-radius: var(--radius-lg);
    }

    .status-row {
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    .status-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-xs);
    }

    .status-icon {
      font-size: var(--font-size-lg);
    }

    .status-label {
      font-size: var(--font-size-xs);
      color: var(--text-tertiary);
    }

    .status-value {
      font-size: var(--font-size-md);
      font-weight: 700;
    }

    /* Companion Messages */
    .companion-messages {
      max-width: 600px;
      margin: var(--space-xl) auto 0;
    }

    .messages-wrapper {
      max-height: 300px;
      overflow-y: auto;
    }

    .message-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }

    .ai-message {
      display: flex;
      gap: var(--space-md);
      padding: var(--space-md);
      border-radius: var(--radius-lg);
    }

    .ai-message-avatar {
      flex-shrink: 0;
    }

    .ai-message-content {
      flex: 1;
    }

    .ai-message-text {
      font-size: var(--font-size-sm);
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .ai-message-time {
      font-size: 10px;
      color: var(--text-tertiary);
      margin-top: var(--space-xs);
      display: block;
    }

    /* Voice Mode */
    .companion-voice-mode {
      max-width: 600px;
      margin: var(--space-lg) auto 0;
    }

    .voice-mode-label {
      display: block;
      margin-bottom: var(--space-sm);
    }

    .voice-mode-options {
      display: flex;
      gap: var(--space-sm);
    }

    .voice-mode-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      background: transparent;
      color: var(--text-tertiary);
      cursor: pointer;
      transition: var(--transition-fast);
    }

    .voice-mode-btn:hover {
      color: var(--text-primary);
      border-color: var(--border-medium);
    }

    .voice-mode-btn.active {
      color: var(--accent-primary);
      border-color: var(--accent-primary);
      background: rgba(99, 102, 241, 0.1);
    }

    /* Terminal Styles */
    .terminal-layout {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: var(--space-lg);
    }

    .terminal-window {
      overflow: hidden;
    }

    .terminal-titlebar {
      display: flex;
      align-items: center;
      padding: var(--space-sm) var(--space-md);
      border-bottom: 1px solid var(--border-subtle);
      gap: var(--space-md);
    }

    .terminal-dots {
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .dot-red { background: #ff5f57; }
    .dot-yellow { background: #ffbd2e; }
    .dot-green { background: #28c840; }

    .terminal-title {
      font-size: var(--font-size-xs);
      color: var(--text-tertiary);
      flex: 1;
    }

    .terminal-tabs {
      display: flex;
      gap: var(--space-sm);
    }

    .terminal-tab {
      font-size: var(--font-size-xs);
      color: var(--text-tertiary);
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      cursor: pointer;
    }

    .terminal-tab.active {
      color: var(--text-primary);
      background: rgba(99, 102, 241, 0.1);
    }

    .terminal-body {
      padding: var(--space-md);
      font-family: var(--font-mono);
      font-size: var(--font-size-xs);
      line-height: 1.8;
      max-height: 400px;
      overflow-y: auto;
      color: var(--text-secondary);
    }

    .terminal-prompt {
      color: var(--text-tertiary);
    }

    .prompt-user { color: var(--accent-emerald); }
    .prompt-at { color: var(--text-tertiary); }
    .prompt-host { color: var(--accent-cyan); }
    .prompt-path { color: var(--accent-primary); margin-left: 4px; }
    .prompt-symbol { color: var(--accent-amber); margin: 0 4px; }
    .prompt-command { color: var(--text-primary); }

    .terminal-line { min-height: 1.4em; }
    .terminal-error { color: var(--accent-rose); }
    .terminal-error-cont { color: var(--accent-rose); padding-left: 1em; }
    .terminal-error-location { color: var(--accent-amber); padding-left: 1em; }
    .terminal-error-summary { color: var(--accent-rose); font-weight: 600; }
    .terminal-success { color: var(--accent-emerald); }
    .terminal-info { color: var(--text-secondary); }
    .terminal-code { color: var(--text-primary); padding-left: 2em; }
    .terminal-pointer { color: var(--accent-rose); padding-left: 2em; }

    /* Analysis Panel */
    .terminal-analysis {
      position: sticky;
      top: 0;
    }

    .analysis-header {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-md);
      color: var(--accent-primary);
    }

    .analysis-thinking {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-md);
    }

    .thinking-dots {
      display: flex;
      gap: 4px;
    }

    .thinking-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-primary);
      animation: bounce 1.4s ease-in-out infinite;
    }

    .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dot:nth-child(3) { animation-delay: 0.4s; }

    /* Root Cause Analysis */
    .rca-header {
      display: flex;
      gap: var(--space-sm);
      margin-bottom: var(--space-lg);
    }

    .rca-section {
      margin-bottom: var(--space-md);
      padding-bottom: var(--space-md);
      border-bottom: 1px solid var(--border-subtle);
    }

    .rca-section:last-of-type {
      border-bottom: none;
    }

    .rca-label {
      font-size: var(--font-size-xs);
      color: var(--accent-primary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-xs);
      font-weight: 600;
    }

    .rca-text {
      font-size: var(--font-size-sm);
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .rca-text code {
      background: rgba(99, 102, 241, 0.1);
      padding: 1px 6px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: var(--font-size-xs);
      color: var(--accent-tertiary);
    }

    .rca-code {
      font-family: var(--font-mono);
      font-size: var(--font-size-xs);
      line-height: 1.8;
      color: var(--text-secondary);
    }

    .code-comment { color: var(--text-tertiary); font-style: italic; }
    .code-keyword { color: var(--accent-primary); }
    .code-fn { color: var(--accent-cyan); }
    .code-string { color: var(--accent-emerald); }

    .rca-actions {
      display: flex;
      gap: var(--space-sm);
    }

    /* Conversation Styles */
    .conversation-layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: var(--space-lg);
      height: calc(100vh - 200px);
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-lg);
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }

    .chat-message {
      display: flex;
      gap: var(--space-sm);
      max-width: 85%;
    }

    .chat-message.user-msg {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-avatar {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ai-avatar {
      background: rgba(99, 102, 241, 0.15);
    }

    .user-avatar {
      background: rgba(34, 211, 238, 0.15);
      color: var(--accent-cyan);
    }

    .msg-content {
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-md);
      background: rgba(99, 102, 241, 0.08);
      border: 1px solid var(--border-subtle);
    }

    .msg-content p {
      font-size: var(--font-size-sm);
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .msg-content code {
      background: rgba(99, 102, 241, 0.15);
      padding: 1px 5px;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: var(--font-size-xs);
      color: var(--accent-tertiary);
    }

    .user-msg .msg-content {
      background: rgba(34, 211, 238, 0.08);
      border-color: rgba(34, 211, 238, 0.15);
    }

    .chat-typing-indicator {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-lg);
    }

    .typing-dots {
      display: flex;
      gap: 4px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-primary);
      animation: bounce 1.4s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    .chat-input-area {
      padding: var(--space-md) var(--space-lg);
      border-top: 1px solid var(--border-subtle);
    }

    .chat-input-wrapper {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-xs) var(--space-sm);
      border: 1px solid var(--border-subtle);
    }

    .chat-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: var(--font-size-sm);
      padding: var(--space-sm);
      outline: none;
      font-family: var(--font-sans);
    }

    .chat-input::placeholder {
      color: var(--text-tertiary);
    }

    .chat-send-btn {
      flex-shrink: 0;
    }

    .chat-suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-xs);
      margin-top: var(--space-sm);
    }

    .suggestion-chip {
      cursor: pointer;
      transition: var(--transition-fast);
      font-size: var(--font-size-xs);
      padding: 4px 12px;
      background: rgba(99, 102, 241, 0.08);
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: var(--radius-full);
      color: var(--text-accent);
    }

    .suggestion-chip:hover {
      background: rgba(99, 102, 241, 0.15);
      border-color: rgba(99, 102, 241, 0.3);
      transform: translateY(-1px);
    }

    .conversation-sidebar {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      overflow-y: auto;
    }

    .context-items, .memory-items {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    .context-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding-bottom: var(--space-sm);
      border-bottom: 1px solid var(--border-subtle);
    }

    /* Dashboard Styles */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-md);
    }

    .gauge-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--space-lg);
      border-radius: var(--radius-lg);
      text-align: center;
    }

    .gauge-svg-container {
      position: relative;
      width: 80px;
      height: 80px;
      margin-bottom: var(--space-sm);
    }

    .gauge-svg {
      width: 100%;
      height: 100%;
    }

    .gauge-value-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: baseline;
    }

    .gauge-number {
      font-size: var(--font-size-lg);
      font-weight: 700;
      color: var(--text-primary);
    }

    .gauge-percent {
      font-size: var(--font-size-xs);
      color: var(--text-tertiary);
    }

    .gauge-label {
      font-size: var(--font-size-xs);
      color: var(--text-secondary);
      margin-bottom: var(--space-xs);
    }

    .gauge-trend {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: var(--font-size-xs);
    }

    .dashboard-overall {
      display: flex;
      align-items: center;
    }

    .overall-score {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .trends-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-sm);
    }

    .trend-card {
      padding: var(--space-sm) var(--space-md);
    }

    .trend-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: var(--space-xs);
    }

    .sparkline-container {
      height: 30px;
    }

    .sparkline {
      width: 100%;
      height: 100%;
    }

    .insight-item {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
    }

    /* Features Grid */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-lg);
    }

    .feature-card-header {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      margin-bottom: var(--space-md);
    }

    .feature-icon {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-md);

      justify-content: space-around;
      padding-top: var(--space-md);
      border-top: 1px solid var(--border-subtle);

      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .kb-stat-value {
      font-size: var(--font-size-lg);
      font-weight: 700;
      color: var(--text-primary);

      color: var(--text-tertiary);
      text-transform: uppercase;

      border-left-color: rgba(52, 211, 153, 0.3);

    }

    .cv-vote-icon {
      font-size: var(--font-size-sm);
    }

    .cv-fix-code {
      padding: var(--space-md);
      background: rgba(10, 10, 15, 0.4);
      border-radius: var(--radius-md);
    }

    @media (max-width: 1200px) {
      .cv-models-grid {

    @media (max-width: 900px) {
      .features-grid {
        grid-template-columns: 1fr;
      }

        grid-template-columns: 1fr;
      }

        grid-template-columns: 1fr;
      }
      .kb-detail-grid {
        grid-template-columns: 1fr;
